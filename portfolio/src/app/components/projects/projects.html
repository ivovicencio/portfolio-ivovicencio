<section class="ProjectsSection">
  <div class="GridOverlay"></div>

  <div class="container">
    <div class="SectionHeader text-center mb-5">
      <h2 class="DisplayTitle">PROYECTOS<span class="Blink">_</span></h2>
      <p class="Subtitle">FILTRAR POR CATEGORÍA DE DESARROLLO</p>
    </div>

    <div class="FilterContainer d-flex justify-content-center gap-3 mb-5">
      <button (click)="setFilter('all')" [class.Active]="activeFilter === 'all'">TODOS</button>
      <button (click)="setFilter('fullstack')" [class.Active]="activeFilter === 'fullstack'">FULL STACK</button>
      <button (click)="setFilter('frontend')" [class.Active]="activeFilter === 'frontend'">FRONTEND</button>
      <button (click)="setFilter('backend')" [class.Active]="activeFilter === 'backend'">BACKEND</button>
    </div>

    <div class="row gy-4">
      <div class="col-lg-4 col-md-6" *ngFor="let p of filteredProjects">
        <div class="ProjectCard" [class.InProgress]="p.status === 'in-progress'">
          
          <div class="CardHeader">
            <span class="CategoryTag">{{ p.category | uppercase }}</span>
            <span class="StatusTag" *ngIf="p.status === 'in-progress'">EN PROCESO</span>
          </div>

          <div class="CardBody">
            <h3 class="ProjectTitle">{{ p.title }}</h3>
            <p class="ProjectDesc">{{ p.description }}</p>
            
            <div class="TechStack">
              <span *ngFor="let t of p.tech" class="TechIcon">{{ t }}</span>
            </div>
          </div>

          <div class="CardFooter">
            <div class="DecorativeBar"></div>
            <button class="ViewButton" (click)="openModal(p)">DETALLES <i class="bi bi-eye"></i></button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div class="ModalOverlay" *ngIf="isModalOpen" (click)="closeModal()">
    <div class="ModalContent" (click)="$event.stopPropagation()">
      <div class="ModalScanner"></div>
      
      <button class="CloseModal" (click)="closeModal()"><i class="bi bi-x-lg"></i></button>
      
      <div class="ModalBody" *ngIf="selectedProject">
        <span class="CategoryTag">PROYECTO // {{ selectedProject.category | uppercase }}</span>
        <h2 class="ModalTitle">{{ selectedProject.title }}</h2>
        
        <div class="HistoryBox">
          <h4 class="HistoryTitle">EL CONTEXTO</h4>
          <p class="HistoryText">{{ selectedProject.history }}</p>
        </div>

        <div class="TechBox mt-4">
          <h4 class="HistoryTitle">TECNOLOGÍAS</h4>
          <div class="TechStack">
            <span *ngFor="let t of selectedProject.tech" class="TechIcon ModalTech">{{ t }}</span>
          </div>
        </div>

        <div class="ModalFooter mt-5">
          <a [href]="selectedProject.link" target="_blank" class="BtnNeon">VER CÓDIGO <i class="bi bi-github"></i></a>
        </div>
      </div>
    </div>
  </div>
</section>
